<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Sessions | EduManager</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <main class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header" id="sidebar-class-name">Loading...</div>
            <ul class="sidebar-menu" id="sidebar-menu">
                <li class="p-4 text-muted">Loading content...</li>
            </ul>
        </aside>

        <!-- Main Content -->
        <section class="main-content">
            <a href="dashboard.html" class="nav-link mb-4" style="display:inline-block;">&larr; Back to Dashboard</a>
            
            <div class="content-header flex justify-between items-center">
                <h1 id="class-title">Loading Class...</h1>
                <!-- Instructor Only Action -->
                <div class="flex gap-2">
                    <button id="btn-create-session" class="btn btn-primary hidden">
                        <span class="material-symbols-outlined">add</span> New Session
                    </button>
                    <button id="btn-create-assignment" class="btn btn-outline hidden">
                        <span class="material-symbols-outlined">add_task</span> New Assignment
                    </button>
                </div>
            </div>

            <div id="error-container"></div>

            <!-- Dynamic Content Area -->
            <div id="dynamic-content">
                <div class="text-center text-muted mt-8">
                    <span class="material-symbols-outlined" style="font-size: 48px; margin-bottom: 1rem;">menu_book</span>
                    <p>Select a topic from the sidebar to view content.</p>
                </div>
            </div>

        </section>
    </main>

    <script type="module" src="assets/js/views/class.js"></script>
</body>
</html>
